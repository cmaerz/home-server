apiVersion: apps/v1
kind: Deployment
metadata:
  name: jdownloader
  namespace: homelab
  labels:
    app: jdownloader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jdownloader
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jdownloader
    spec:
      containers:
        - name: jdownloader
          image: jlesage/jdownloader-2:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5800
              protocol: TCP
            - name: vnc
              containerPort: 5900
              protocol: TCP
          env:
            - name: USER_ID
              value: "1000"
            - name: GROUP_ID
              value: "1000"
            - name: TZ
              value: "Europe/Berlin"
            - name: KEEP_APP_RUNNING
              value: "1"
            - name: CLEAN_TMP_DIR
              value: "1"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: output
              mountPath: /output
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jdownloader-config-pvc
        - name: output
          hostPath:
            path: /data/media
            type: DirectoryOrCreate
