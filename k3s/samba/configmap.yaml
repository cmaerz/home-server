apiVersion: v1
kind: ConfigMap
metadata:
  name: samba-config
  namespace: homelab
  labels:
    app: samba
data:
  smb.conf: |
    [global]
    workgroup = WORKGROUP
    server string = Homelab NAS
    server role = standalone server
    log file = /var/log/samba/log.%m
    max log size = 50
    dns proxy = no
    map to guest = Bad User
    usershare allow guests = yes

    # Performance tuning
    socket options = TCP_NODELAY IPTOS_LOWDELAY
    read raw = yes
    write raw = yes
    use sendfile = yes
    aio read size = 16384
    aio write size = 16384

    # macOS compatibility (vfs_fruit)
    vfs objects = fruit streams_xattr
    fruit:metadata = stream
    fruit:model = MacSamba
    fruit:posix_rename = yes
    fruit:veto_appledouble = no
    fruit:nfs_aces = no
    fruit:wipe_intentionally_left_blank_rfork = yes
    fruit:delete_empty_adfiles = yes

    [media]
    path = /data/media
    browseable = yes
    read only = no
    guest ok = no
    valid users = nas
    create mask = 0664
    directory mask = 0775
    force user = nas
    force group = nas

    [shared]
    path = /data/shared
    browseable = yes
    read only = no
    guest ok = no
    valid users = nas
    create mask = 0664
    directory mask = 0775
    force user = nas
    force group = nas

    [downloads]
    path = /data/media/downloads
    browseable = yes
    read only = no
    guest ok = no
    valid users = nas
    create mask = 0664
    directory mask = 0775
    force user = nas
    force group = nas
