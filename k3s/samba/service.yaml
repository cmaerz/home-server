apiVersion: v1
kind: Service
metadata:
  name: samba
  namespace: homelab
  labels:
    app: samba
spec:
  type: LoadBalancer
  selector:
    app: samba
  ports:
    - name: smb
      port: 445
      targetPort: 445
      protocol: TCP
    - name: netbios
      port: 139
      targetPort: 139
      protocol: TCP
