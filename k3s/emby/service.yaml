apiVersion: v1
kind: Service
metadata:
  name: emby
  namespace: homelab
  labels:
    app: emby
spec:
  type: NodePort
  ports:
    - name: http
      port: 8096
      targetPort: 8096
      nodePort: 30096
      protocol: TCP
    - name: https
      port: 8920
      targetPort: 8920
      nodePort: 30920
      protocol: TCP
  selector:
    app: emby
