---
# PiHole DNS (CoreDNS forwards here)
apiVersion: v1
kind: Service
metadata:
  name: pihole-dns
  namespace: homelab
  labels:
    app: pihole
spec:
  type: ClusterIP
  ports:
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
  selector:
    app: pihole

---
# Web UI Service
apiVersion: v1
kind: Service
metadata:
  name: pihole-web
  namespace: homelab
  labels:
    app: pihole
spec:
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
  selector:
    app: pihole
