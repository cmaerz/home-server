---
# CoreDNS Service - LoadBalancer gets external IP from k3s servicelb
apiVersion: v1
kind: Service
metadata:
  name: coredns
  namespace: homelab
  labels:
    app: coredns
  annotations:
    # Force same IP for both TCP and UDP
    metallb.universe.tf/allow-shared-ip: "coredns"
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.1.2
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
  selector:
    app: coredns
