apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: homelab
  labels:
    app: coredns
data:
  # Update NODE_IP to your k3s node's IP address
  NODE_IP: "192.168.1.2"

  Corefile: |
    # Internal domain - returns node IP for all services
    sandharlanden.maerz:53 {
        log
        errors
        template IN A {
            answer "{{ .Name }} 60 IN A {$NODE_IP}"
            fallthrough
        }
        template IN AAAA {
            rcode NOERROR
        }
    }

    # All other queries go to PiHole for ad-blocking
    .:53 {
        log
        errors
        forward . pihole-dns.homelab.svc.cluster.local:53
        cache 30
    }
