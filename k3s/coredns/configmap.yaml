apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: homelab
  labels:
    app: coredns
data:
  Corefile: |
    .:53 {
        any
        log
        errors
        hosts /etc/coredns/hosts {
            fallthrough
        }
        forward . 1.1.1.1 8.8.8.8
        cache 30
    }

  # Add your internal hostnames here
  hosts: |
    192.168.1.2 emby.sandharlanden.maerz
    192.168.1.2 pihole.sandharlanden.maerz
    192.168.1.2 jdownloader.sandharlanden.maerz
    192.168.1.2 sandharlanden.maerz
