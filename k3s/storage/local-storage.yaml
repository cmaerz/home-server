---
# PersistentVolume for Emby config
apiVersion: v1
kind: PersistentVolume
metadata:
  name: emby-config-pv
  labels:
    app: emby
    type: config
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  hostPath:
    path: /var/lib/homelab/emby
    type: DirectoryOrCreate

