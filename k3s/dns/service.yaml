apiVersion: v1
kind: Service
metadata:
  name: dnsmasq
  namespace: homelab
  labels:
    app: dnsmasq
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.1.2
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
  selector:
    app: dnsmasq
